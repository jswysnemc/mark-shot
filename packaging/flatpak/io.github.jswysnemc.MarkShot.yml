app-id: io.github.jswysnemc.MarkShot
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: mark-shot

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-pictures
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.kde.KWin.ScreenShot2

cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/man

modules:
  - name: mark-shot
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DMARK_SHOT_WITH_LAYER_SHELL=OFF
      - -DMARK_SHOT_WITH_LIBPORTAL=ON
    sources:
      - type: dir
        path: ../..
    post-install:
      - install -Dm644 packaging/flatpak/io.github.jswysnemc.MarkShot.metainfo.xml /app/share/metainfo/io.github.jswysnemc.MarkShot.metainfo.xml
      - mv /app/share/applications/mark-shot.desktop /app/share/applications/io.github.jswysnemc.MarkShot.desktop
      - desktop-file-edit --set-key=Icon --set-value=io.github.jswysnemc.MarkShot /app/share/applications/io.github.jswysnemc.MarkShot.desktop
      - desktop-file-edit --set-key=Exec --set-value=mark-shot /app/share/applications/io.github.jswysnemc.MarkShot.desktop
      - mv /app/share/icons/hicolor/scalable/apps/mark-shot.svg /app/share/icons/hicolor/scalable/apps/io.github.jswysnemc.MarkShot.svg
      - rm -f /app/share/applications/mark-shot-edit.desktop
      - rm -f /app/share/icons/hicolor/scalable/apps/mark-shot-edit.svg
