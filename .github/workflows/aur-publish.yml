name: Publish AUR

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        type: string
      pkgrel:
        description: 'AUR package release number'
        required: false
        default: '1'
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  aur:
    name: Push mark-shot to AUR
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag || github.ref_name }}"
          if [ -z "$TAG" ]; then
            echo "No release tag was provided" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          PKGREL="${{ github.event.inputs.pkgrel }}"
          if [ -z "$PKGREL" ]; then
            PKGREL=1
          fi
          case "$PKGREL" in
            ''|*[!0-9]*|0)
              echo "pkgrel must be a positive integer" >&2
              exit 1
              ;;
          esac
          REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
          COMMIT="$(git ls-remote --tags "$REPO_URL" "refs/tags/${TAG}^{}" | awk '{print $1}' | head -n 1)"
          if [ -z "$COMMIT" ]; then
            COMMIT="$(git ls-remote --tags "$REPO_URL" "refs/tags/${TAG}" | awk '{print $1}' | head -n 1)"
          fi
          if [ -z "$COMMIT" ]; then
            echo "No commit was found for release tag $TAG" >&2
            exit 1
          fi
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "pkgrel=$PKGREL"
            echo "commit=$COMMIT"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout packaging files
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || steps.version.outputs.tag }}

      - name: Prepare AUR files
        run: |
          mkdir -p aur-work
          cp packaging/aur/PKGBUILD aur-work/PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" aur-work/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=${{ steps.version.outputs.pkgrel }}/" aur-work/PKGBUILD
          if grep -q '^_commit=' aur-work/PKGBUILD; then
            sed -i "s/^_commit=.*/_commit=${{ steps.version.outputs.commit }}/" aur-work/PKGBUILD
          fi

      - name: Generate .SRCINFO
        run: |
          docker run --rm \
            -v "$PWD/aur-work:/pkg" \
            -w /pkg \
            archlinux:base-devel \
            bash -lc 'pacman -Sy --noconfirm sudo >/dev/null && useradd -m builder && chown -R builder:builder /pkg && su builder -c "cd /pkg && makepkg --printsrcinfo > .SRCINFO"'

      - name: Configure SSH
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$AUR_SSH_PRIVATE_KEY" ]; then
            echo "AUR_SSH_PRIVATE_KEY is not set" >&2
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Push to AUR
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/aur -o IdentitiesOnly=yes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if git clone ssh://aur@aur.archlinux.org/mark-shot.git aur-repo; then
            :
          else
            mkdir aur-repo
            git -C aur-repo init
            git -C aur-repo remote add origin ssh://aur@aur.archlinux.org/mark-shot.git
          fi

          cp aur-work/PKGBUILD aur-work/.SRCINFO aur-repo/
          git -C aur-repo branch -M master
          git -C aur-repo add PKGBUILD .SRCINFO

          if git -C aur-repo diff --cached --quiet; then
            echo "AUR package is already up to date"
            exit 0
          fi

          git -C aur-repo commit -m "Update to ${{ steps.version.outputs.version }}-${{ steps.version.outputs.pkgrel }}"
          git -C aur-repo push origin master
