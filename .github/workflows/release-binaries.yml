name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.2'
        required: true
        type: string
      upload_to_release:
        description: 'Attach manual-run binary assets to the GitHub Release matching tag'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux:
    name: Build Linux x86_64 binary package
    runs-on: ubuntu-latest
    container: archlinux:base-devel

    steps:
      - name: Resolve tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag || github.ref_name }}"
          if [ -z "$TAG" ]; then
            echo "No release tag was provided" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            cmake \
            gcc \
            ninja \
            pkgconf \
            pipewire \
            qt6-base \
            qt6-wayland \
            layer-shell-qt

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --parallel

      - name: Package install tree
        shell: bash
        run: |
          cmake --install build --prefix "$PWD/app"
          install -Dm644 LICENSE app/share/licenses/mark-shot/LICENSE
          install -Dm644 README.md app/share/doc/mark-shot/README.md
          install -Dm644 README.zh-CN.md app/share/doc/mark-shot/README.zh-CN.md

          ASSET="mark-shot-${{ steps.version.outputs.tag }}-linux-x86_64.tar.gz"
          tar -C app -czf "$ASSET" .
          sha256sum "$ASSET" > "$ASSET.sha256"

      - name: Upload binaries to release
        if: github.event_name == 'release' || github.event_name == 'push' || inputs.upload_to_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            mark-shot-${{ steps.version.outputs.tag }}-linux-x86_64.tar.gz
            mark-shot-${{ steps.version.outputs.tag }}-linux-x86_64.tar.gz.sha256

      - name: Upload binaries artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mark-shot-linux-x86_64-${{ steps.version.outputs.tag }}
          path: |
            mark-shot-${{ steps.version.outputs.tag }}-linux-x86_64.tar.gz
            mark-shot-${{ steps.version.outputs.tag }}-linux-x86_64.tar.gz.sha256
          if-no-files-found: error

  linux-arm64:
    name: Build Linux arm64 binary package
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Resolve tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag || github.ref_name }}"
          if [ -z "$TAG" ]; then
            echo "No release tag was provided" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libgl1-mesa-dev \
            libpipewire-0.3-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            ninja-build \
            pkg-config \
            qt6-base-dev \
            qt6-base-dev-tools

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --parallel

      - name: Package install tree
        shell: bash
        run: |
          cmake --install build --prefix "$PWD/app"
          install -Dm644 LICENSE app/share/licenses/mark-shot/LICENSE
          install -Dm644 README.md app/share/doc/mark-shot/README.md
          install -Dm644 README.zh-CN.md app/share/doc/mark-shot/README.zh-CN.md

          ASSET="mark-shot-${{ steps.version.outputs.tag }}-linux-arm64.tar.gz"
          tar -C app -czf "$ASSET" .
          sha256sum "$ASSET" > "$ASSET.sha256"

      - name: Upload binaries to release
        if: github.event_name == 'release' || github.event_name == 'push' || inputs.upload_to_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            mark-shot-${{ steps.version.outputs.tag }}-linux-arm64.tar.gz
            mark-shot-${{ steps.version.outputs.tag }}-linux-arm64.tar.gz.sha256

      - name: Upload binaries artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mark-shot-linux-arm64-${{ steps.version.outputs.tag }}
          path: |
            mark-shot-${{ steps.version.outputs.tag }}-linux-arm64.tar.gz
            mark-shot-${{ steps.version.outputs.tag }}-linux-arm64.tar.gz.sha256
          if-no-files-found: error

  windows:
    name: Build Windows x86_64 binary package
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Resolve tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag || github.ref_name }}"
          if [ -z "$TAG" ]; then
            echo "No release tag was provided" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            zip
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-cppwinrt
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-tools

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMARK_SHOT_WITH_LAYER_SHELL=OFF \
            -DMARK_SHOT_WITH_LIBPORTAL=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package install tree
        run: |
          cmake --install build --prefix "$PWD/app"
          install -Dm644 LICENSE app/share/licenses/mark-shot/LICENSE
          install -Dm644 README.md app/share/doc/mark-shot/README.md
          install -Dm644 README.zh-CN.md app/share/doc/mark-shot/README.zh-CN.md

      - name: Deploy runtime libraries
        run: |
          set -euo pipefail

          app_bin="$PWD/app/bin"
          exe="$app_bin/mark-shot.exe"
          if [ ! -x "$exe" ]; then
            echo "Expected executable not found: $exe" >&2
            exit 1
          fi

          windeployqt_path="$(command -v windeployqt || true)"
          if [ -z "$windeployqt_path" ]; then
            windeployqt_path="$(command -v windeployqt6 || true)"
          fi
          if [ -z "$windeployqt_path" ]; then
            windeployqt_path="$(find /ucrt64 -type f -name windeployqt.exe -print -quit)"
          fi
          if [ -z "$windeployqt_path" ]; then
            echo "windeployqt was not found" >&2
            exit 1
          fi

          "$windeployqt_path" --release --compiler-runtime --dir "$app_bin" "$exe"

          declare -A seen
          mapfile -t queue < <(find "$app_bin" -type f \( -name "*.exe" -o -name "*.dll" \))
          while ((${#queue[@]})); do
            current="${queue[0]}"
            queue=("${queue[@]:1}")
            current_key="$(cygpath -am "$current" 2>/dev/null || printf '%s' "$current")"
            if [[ -n "${seen[$current_key]:-}" ]]; then
              continue
            fi
            seen["$current_key"]=1

            while IFS= read -r dep_name; do
              dep_path="/ucrt64/bin/$dep_name"
              if [ ! -f "$dep_path" ]; then
                continue
              fi

              dest="$app_bin/$(basename "$dep_path")"
              if [ ! -f "$dest" ]; then
                cp "$dep_path" "$dest"
              fi
              queue+=("$dest")
            done < <(objdump -p "$current" | awk '/DLL Name:/ { print $3 }')
          done

          find "$app_bin" -maxdepth 1 -type f -name "*.dll" -printf "%f\n" | sort

      - name: Package zip
        run: |
          ASSET="mark-shot-${{ steps.version.outputs.tag }}-windows-x86_64.zip"
          (cd app && zip -r "../$ASSET" .)
          sha256sum "$ASSET" > "$ASSET.sha256"

      - name: Upload binaries to release
        if: github.event_name == 'release' || github.event_name == 'push' || inputs.upload_to_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            mark-shot-${{ steps.version.outputs.tag }}-windows-x86_64.zip
            mark-shot-${{ steps.version.outputs.tag }}-windows-x86_64.zip.sha256

      - name: Upload binaries artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mark-shot-windows-x86_64-${{ steps.version.outputs.tag }}
          path: |
            mark-shot-${{ steps.version.outputs.tag }}-windows-x86_64.zip
            mark-shot-${{ steps.version.outputs.tag }}-windows-x86_64.zip.sha256
          if-no-files-found: error
