name: Release Flatpak

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag or package version for test runs, for example v0.1.20'
        required: true
        type: string
      checkout_ref:
        description: 'Optional source ref for manual runs, for example v0.1.20'
        required: false
        type: string
      upload_to_release:
        description: 'Attach manual-run Flatpak assets to the GitHub Release matching tag'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  flatpak:
    name: Build Flatpak bundle
    runs-on: ubuntu-latest

    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "No release tag or package version was provided" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          CHECKOUT_INPUT="${{ inputs.checkout_ref }}"
          if [ "${{ github.event_name }}" = "release" ]; then
            CHECKOUT_REF="$TAG"
          elif [ -n "$CHECKOUT_INPUT" ]; then
            CHECKOUT_REF="$CHECKOUT_INPUT"
          else
            CHECKOUT_REF="${{ github.ref_name }}"
          fi
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "checkout_ref=$CHECKOUT_REF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.checkout_ref }}

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            appstream \
            desktop-file-utils \
            elfutils \
            flatpak \
            flatpak-builder \
            librsvg2-bin
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak bundle
        id: package
        shell: bash
        run: |
          set -euo pipefail

          ASSET="mark-shot-${{ steps.version.outputs.tag }}-linux-x86_64.flatpak"
          rsvg-convert \
            -w 128 \
            -h 128 \
            data/icons/hicolor/scalable/apps/mark-shot.svg \
            -o packaging/flatpak/io.github.jswysnemc.MarkShot.png

          cd packaging/flatpak
          flatpak-builder \
            --user \
            --install-deps-from=flathub \
            --force-clean \
            --repo="$GITHUB_WORKSPACE/flatpak-repo" \
            "$GITHUB_WORKSPACE/flatpak-build" \
            io.github.jswysnemc.MarkShot.yml

          cd "$GITHUB_WORKSPACE"
          flatpak build-bundle flatpak-repo "$ASSET" io.github.jswysnemc.MarkShot stable
          sha256sum "$ASSET" > "$ASSET.sha256"

          {
            echo "asset=$ASSET"
            echo "checksum=$ASSET.sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Flatpak artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mark-shot-flatpak-${{ steps.version.outputs.tag }}
          path: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error

      - name: Upload Flatpak to release
        if: github.event_name == 'release' || inputs.upload_to_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.checksum }}
